<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Manage Stock</title>
</head>
<body>
    <nav>
        <a href="/dashboard">Home</a> | <a href="/inventory">Inventory</a> | 
        <a href="/debts">Debts</a> | <a href="/reports">Reports</a> | <a href="/logout">Logout</a>
    </nav>
    
    <h2>Add New Stock</h2>
    <form action="/inventory" method="POST">
        <input type="text" name="name" placeholder="Product Name (e.g. Mango Juice)" required>
        <input type="number" step="0.01" name="price" placeholder="Price per unit" required>
        <input type="number" name="stock" placeholder="Initial Quantity" required>
        <button type="submit">Add Product</button>
    </form>

    <hr>

    <h3>Current Inventory</h3>
    
    <div class="search-container" style="margin-bottom: 15px;">
        <input type="text" id="inventorySearch" onkeyup="filterInventory()" 
               placeholder="Search for snacks or juices..." 
               style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
    </div>

    <table id="inventoryTable">
        <thead>
            <tr>
                <th>Item</th>
                <th>Price</th>
                <th>Remaining Stock</th>
                <th>Actions</th> </tr>
        </thead>
        <tbody>
            {% for p in products %}
            <tr>
                <td>{{ p.name }}</td>
                <td>KES {{ p.price }}</td>
                <td>
                    {{ p.stock }}
                    {% if p.stock < 5 %}
                        <span style="background-color: #ff4d4d; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-left: 10px;">
                            Low Stock
                        </span>
                    {% endif %}
                </td>
                <td>
                    <a href="{{ url_for('edit_product', product_id=p.id) }}" 
                       style="background-color: #3498db; color: white; padding: 5px 10px; text-decoration: none; border-radius: 3px; font-size: 0.9em;">
                       Edit
                    </a>
                    
                    <a href="{{ url_for('delete_product', product_id=p.id) }}" 
                       style="background-color: #e74c3c; color: white; padding: 5px 10px; text-decoration: none; border-radius: 3px; font-size: 0.9em; margin-left: 5px;"
                       onclick="return confirm('Are you sure you want to delete {{ p.name }}?')">
                       Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
    function filterInventory() {
      var input, filter, table, tr, td, i, txtValue;
      input = document.getElementById("inventorySearch");
      filter = input.value.toUpperCase();
      table = document.getElementById("inventoryTable");
      tr = table.getElementsByTagName("tr");

      for (i = 1; i < tr.length; i++) {
        td = tr[i].getElementsByTagName("td")[0]; 
        if (td) {
          txtValue = td.textContent || td.innerText;
          if (txtValue.toUpperCase().indexOf(filter) > -1) {
            tr[i].style.display = "";
          } else {
            tr[i].style.display = "none";
          }
        }
      }
    }
    </script>
</body>
</html>
