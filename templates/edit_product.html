<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Edit Product</title>
</head>
<body>
    <nav>
        <a href="/dashboard">Home</a> | <a href="/inventory">Inventory</a> | 
        <a href="/debts">Debts</a> | <a href="/reports">Reports</a> | <a href="/logout">Logout</a>
    </nav>

    <div class="container">
        <h2>Edit Product: {{ product.name }}</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" class="edit-form">
            <div class="form-group">
                <label>Product Name:</label>
                <input type="text" name="name" value="{{ product.name }}" required>
            </div>

            <div class="form-group">
                <label>Price (KES):</label>
                <input type="number" step="0.01" name="price" value="{{ product.price }}" required>
            </div>

            <div class="form-group">
                <label>Current Stock Level:</label>
                <input type="number" name="stock" value="{{ product.stock }}" required>
            </div>

            <div class="button-group" style="margin-top: 20px;">
                <button type="submit" style="background-color: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
                    Save Changes
                </button>
                <a href="/inventory" style="background-color: #95a5a6; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-left: 10px;">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
